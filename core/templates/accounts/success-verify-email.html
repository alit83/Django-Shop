{% extends "base.html" %}
{% load static %}

{% block content %}
<!-- Content -->
<div class="container content-space-3 content-space-lg-5">
    <div class="w-md-75 w-lg-50 text-center mx-md-auto">
        <div class="mb-5">
            <img class="img-fluid" src="{% static '/svg/illustrations/oc-hi-five.svg' %}" alt="Image Description"
                style="width: 15rem;">
        </div>

        <div class="mb-5">
            <h1 class="h2">ایمیل شما با موفقیت تایید شد.</h1>
        </div>

        
        <a class="btn btn-primary btn-transition rounded-pill px-6" href="{% url 'website:index' %}"> بازگشت به صفحه اصلی</a>
    </div>
</div>
<!-- End Content -->


<!-- Clients -->
<div class="container content-space-2">
    <div class="row">
        <div class="col text-center py-3">
            <img class="avatar avatar-lg avatar-4x3" src="{% static '/svg/brands/hollister-dark.svg' %}" alt="Logo">
        </div>
        <!-- End Col -->

        <div class="col text-center py-3">
            <img class="avatar avatar-lg avatar-4x3" src="{% static '/svg/brands/levis-dark.svg' %}" alt="Logo">
        </div>
        <!-- End Col -->

        <div class="col text-center py-3">
            <img class="avatar avatar-lg avatar-4x3" src="{% static '/svg/brands/new-balance-dark.svg' %}" alt="Logo">
        </div>
        <!-- End Col -->

        <div class="col text-center py-3">
            <img class="avatar avatar-lg avatar-4x3" src="{% static '/svg/brands/puma-dark.svg' %}" alt="Logo">
        </div>
        <!-- End Col -->

        <div class="col text-center py-3">
            <img class="avatar avatar-lg avatar-4x3" src="{% static '/svg/brands/nike-dark.svg' %}" alt="Logo">
        </div>
        <!-- End Col -->

        <div class="col text-center py-3">
            <img class="avatar avatar-lg avatar-4x3" src="{% static '/svg/brands/tnf-dark.svg' %}" alt="Logo">
        </div>
        <!-- End Col -->
    </div>
    <!-- End Row -->
</div>
<!-- End Clients -->
{% endblock content %}
